name: Far Away CI

on:
  push:
    branches: [ main, master, aditya-backend ]
  pull_request:
    branches: [ main, master, aditya-backend ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Check syntax
        run: npm run check
        working-directory: backend

      - name: Predeploy config report
        run: npm run predeploy:check
        working-directory: backend

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint check
        run: npm run lint
        working-directory: frontend

      - name: Predeploy config report
        run: npm run predeploy:check
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  production-compose:
    name: Production Compose Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare example backend env
        run: cp backend/.env.production.example backend/.env

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config
